<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/settings.css" />
</head>

<body>
  <div class="page-layout">
    <aside class="sidebar">
      <h2>Menu</h2>
      <nav class="sidebar-nav">
        <a class="nav-link" href="/dashboard">Dashboard</a>
        <a class="nav-link" href="/simulation">Simulation</a>
        <a class="nav-link" href="/logs">Logs</a>
        <a class="nav-link active" href="/settings">Settings</a>
      </nav>
      <button id="logoutBtn" class="danger-btn full-width-btn">Logout</button>
    </aside>

    <main class="page-main">
      <header class="simple-card page-header">
        <div>
          <h1>Settings</h1>
          <p id="operatorLabel" class="page-text"></p>
        </div>
      </header>

      <section class="simple-card">
        <h2>Profile</h2>
        <p class="page-text">Manage your account and update your password.</p>
        
        <div class="form-group" style="margin-top: 16px;">
          <span class="info-label">Operator ID</span>
          <strong id="profileOperatorId" style="font-size: 18px; color: var(--text-primary);">--</strong>
        </div>

        <div style="margin-top: 24px; border-top: 1px solid var(--border-color); padding-top: 24px;">
          <a href="/change-password" class="primary-btn">Change Password</a>
        </div>
      </section>

      <section class="simple-card">
        <h2>Auto Mode</h2>
        <p class="page-text">When Auto Mode is ON, the system can fault and change stream automatically.</p>
        <label class="toggle-row">
          <span>Auto Mode</span>
          <input id="autoModeToggle" type="checkbox" />
        </label>
        <p id="autoModeStatus" class="page-text"></p>
      </section>

      <section class="simple-card">
        <h2>Appearance</h2>
        <p class="page-text">Toggle between Light and Dark theme.</p>
        <label class="toggle-row">
          <span>Dark Mode</span>
          <input id="darkModeToggle" type="checkbox" />
        </label>
      </section>
    </main>
  </div>

  <script src="/site.js"></script>
  <script src="/settings.js"></script>
</body>

</html>
