<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/settings.css" />
    <style>
      .center-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 24px;
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 500;
      }
      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="center-page">
      <section class="simple-card" style="width: min(400px, 100%);">
        <a href="/settings" class="back-link">&larr; Back to Settings</a>
        <h2>Change Password</h2>
        <p class="page-text">Update your account password.</p>
        
        <div class="settings-form" style="margin-top: 16px;">
          <div class="form-group">
            <label for="oldPassword">Old Password</label>
            <input type="password" id="oldPassword" placeholder="Current password">
          </div>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" placeholder="New password (min 6 chars)">
          </div>
          <div class="form-group">
            <label for="confirmNewPassword">Confirm New Password</label>
            <input type="password" id="confirmNewPassword" placeholder="Confirm new password">
          </div>
          <p id="passwordMessage" class="page-text" style="margin-top: 8px;"></p>
          <div style="margin-top: 16px;">
            <button id="changePasswordBtn" class="primary-btn full-width-btn">Update Password</button>
          </div>
        </div>
      </section>
    </main>
    <script src="/site.js"></script>
    <script src="/change-password.js"></script>
  </body>
</html>
