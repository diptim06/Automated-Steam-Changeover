<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/login.css" />
    <link rel="stylesheet" href="/settings.css" />
    <style>
      .back-link {
        display: inline-block;
        margin-bottom: 24px;
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 500;
      }
      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="center-page">
      <section class="simple-card auth-card" style="width: min(400px, 100%);">
        <a href="/login" class="back-link">&larr; Back to Login</a>
        <h2>Reset Password</h2>
        <p class="page-text" id="flowDescription">Enter your Operator ID to request a reset code.</p>
        
        <!-- Step 1: Request OTP -->
        <div id="step1" class="settings-form" style="margin-top: 16px;">
          <div class="form-group">
            <label for="operatorId">Operator ID</label>
            <input type="text" inputmode="numeric" id="operatorId" placeholder="e.g. 12345">
          </div>
          <p id="step1Message" class="page-text" style="margin-top: 8px;"></p>
          <div style="margin-top: 16px;">
            <button id="requestOtpBtn" class="primary-btn full-width-btn">Request Reset Code</button>
          </div>
        </div>

        <!-- Step 2: Reset Password -->
        <div id="step2" class="settings-form" style="display: none; margin-top: 16px;">
          <div class="form-group">
            <label for="otp">Reset Code (OTP)</label>
            <input type="text" id="otp" placeholder="Enter 4-digit code">
          </div>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" placeholder="New password (min 6 chars)">
          </div>
          <div class="form-group">
            <label for="confirmNewPassword">Confirm New Password</label>
            <input type="password" id="confirmNewPassword" placeholder="Confirm new password">
          </div>
          <p id="step2Message" class="page-text" style="margin-top: 8px;"></p>
          <div style="margin-top: 16px;">
            <button id="resetPasswordBtn" class="primary-btn full-width-btn">Confirm New Password</button>
          </div>
        </div>
      </section>
    </main>
    <script src="/forgot-password.js"></script>
  </body>
</html>
