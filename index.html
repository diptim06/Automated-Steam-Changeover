<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow Metering System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #000000;
      --primary: #0088ff;
      --primary-hover: #9ee2f0;
      --text-main: #ffffff;
      --text-muted: #b3c5d1;
      --card-bg: rgba(0, 0, 0, 0.75);
      --card-border: rgba(0, 136, 255, 0.3);
      --success: #39ff14;
    }

    [data-theme="light"] {
      --bg-color: #f0f4f8;
      --primary: #0077ff;
      --primary-hover: #0055cc;
      --text-main: #0f172a;
      --text-muted: #475569;
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(0, 119, 255, 0.4);
      --success: #059669;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Background */
    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80') center/cover no-repeat;
      z-index: -2;
      filter: brightness(0.4) grayscale(0.3);
      transition: filter 0.3s ease;
    }

    [data-theme="light"] .bg-image {
      filter: brightness(1) grayscale(0);
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: -1;
      transition: background 0.3s ease;
    }

    [data-theme="light"] .bg-overlay {
      background: rgba(255, 255, 255, 0.45);
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 5%;
      border-bottom: 1px solid var(--card-border);
      background: rgba(0, 0, 0, 0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.25rem;
      font-weight: 700;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .theme-toggle {
      background: transparent;
      border: none;
      color: var(--text-main);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }

    .theme-toggle:hover {
      color: var(--primary);
    }

    .nav-login {
      color: var(--text-main);
      text-decoration: none;
      padding: 0.5rem 1.25rem;
      border: 1px solid var(--card-border);
      border-radius: 6px;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .nav-login:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Hero Section */
    .hero-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 3rem 5%;
      gap: 3rem;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      background: rgba(16, 185, 129, 0.15);
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .dot {
      width: 8px;
      height: 8px;
      background-color: var(--success);
      border-radius: 50%;
    }

    .hero-title {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700;
      line-height: 1.2;
      margin-top: 1rem;
    }

    .hero-title span {
      color: var(--primary);
    }

    .hero-desc {
      font-size: 1.1rem;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 550px;
      margin: 1rem auto 2rem;
    }

    .btn-primary {
      display: inline-block;
      padding: 0.8rem 2rem;
      background-color: var(--primary);
      color: var(--text-main);
      text-decoration: none;
      border-radius: 6px;
      font-weight: 700;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      box-shadow: 0 0 10px rgba(0, 136, 255, 0.4);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(0, 136, 255, 0.6);
    }

    /* Dashboard Preview Card */
    .dashboard-preview {
      width: 100%;
      max-width: 900px;
    }

    .glass-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--card-border);
    }

    .card-header h3 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .live-indicator {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
    }

    .metric-box {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      padding: 1.25rem;
      border-radius: 8px;
      text-align: left;
    }

    .metric-title {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .metric-value {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .unit {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .metric-trend {
      font-size: 0.85rem;
    }

    .positive {
      color: var(--success);
    }

    .neutral {
      color: var(--text-muted);
    }

    .primary-text {
      color: var(--primary);
    }

    @media (max-width: 768px) {
      .navbar {
        padding: 1rem 5%;
      }

      .hero-container {
        padding: 2rem 5%;
        gap: 2rem;
      }

      .glass-card {
        padding: 1.5rem;
      }

      .metric-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <!-- Background layers -->
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <nav class="navbar">
    <div class="logo">
      <span class="logo-text">FlowMeter</span>
    </div>
    <div class="nav-actions">
      <button id="themeToggleBtn" class="theme-toggle" aria-label="Toggle theme">
        <svg id="moonIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" style="display: none;">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg id="sunIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
      <a href="/login" class="nav-login">Login</a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="hero-container">
    <div class="hero-content">
      <div class="status-badge">
        <span class="dot"></span> System Active
      </div>

      <h1 class="hero-title">Flow Metering <span>System</span></h1>

      <p class="hero-desc">
        Monitor industrial flow rates, pipeline pressure, and valve operations from a centralized dashboard.
      </p>

      <a href="/login" class="btn-primary">
        Access Dashboard
      </a>
    </div>

    <div class="dashboard-preview">
      <div class="glass-card">
        <div class="card-header">
          <h3>System Overview</h3>
          <div class="live-indicator">Live Data</div>
        </div>

        <div class="metric-grid">
          <div class="metric-box">
            <div class="metric-title">Flow Rate</div>
            <div class="metric-value">4,250 <span class="unit">L/h</span></div>
            <div class="metric-trend positive">Stable</div>
          </div>

          <div class="metric-box">
            <div class="metric-title">Pressure</div>
            <div class="metric-value">85.2 <span class="unit">PSI</span></div>
            <div class="metric-trend neutral">Normal</div>
          </div>

          <div class="metric-box">
            <div class="metric-title">Active Stream</div>
            <div class="metric-value">Stream A</div>
            <div class="metric-trend primary-text">Valve Open</div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');

    function setTheme(isDark) {
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      }
    }

    const savedTheme = localStorage.getItem('theme');
    const isDark = savedTheme ? savedTheme === 'dark' : true;
    setTheme(isDark);

    themeToggleBtn.addEventListener('click', () => {
      const isCurrentlyDark = !document.documentElement.hasAttribute('data-theme');
      const newIsDark = !isCurrentlyDark;
      setTheme(newIsDark);
      localStorage.setItem('theme', newIsDark ? 'dark' : 'light');
    });
  </script>
</body>

</html>
